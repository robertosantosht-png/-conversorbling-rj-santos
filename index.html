<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Conversor Bling → Excel</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #e7f7ee;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: #d8f3dd;
            width: 95%;
            max-width: 900px;
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 0 20px rgba(0,0,0,0.15);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #2d5a3d;
            font-size: 26px;
        }

        /* GRID PRINCIPAL (2 colunas) */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .full {
            grid-column: span 2;
        }

        /* INPUTS */
        label {
            font-weight: bold;
            margin-bottom: 6px;
            display: block;
            color: #1f4730;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #94c9a8;
            border-radius: 10px;
            font-size: 16px;
        }

        .upload-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            border: 2px dashed #73b38c;
            text-align: center;
        }

        button {
            width: 100%;
            padding: 18px;
            background: #3c8f5e;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            background: #2f744c;
        }

        /* RESPONSIVIDADE MOBILE */
        @media (max-width: 640px) {

            .grid {
                grid-template-columns: 1fr; /* de 2 colunas → 1 coluna */
            }

            .full {
                grid-column: span 1;
            }

            h1 {
                font-size: 22px;
            }

            button {
                font-size: 17px;
                padding: 15px;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Conversor Bling → Excel</h1>

        <form action="/converter" method="POST" enctype="multipart/form-data">

            <div class="grid">

                <div>
                    <label>Markup (%)</label>
                    <input type="number" step="0.01" name="markup" required>
                </div>

                <div>
                    <label>CEST do Produto</label>
                    <input type="text" name="cest" required>
                </div>

                <div>
                    <label>Modo de Operação</label>
                    <select name="modo" required>
                        <option value="normal">Normal</option>
                        <option value="atacado">Atacado</option>
                    </select>
                </div>

                <div>
                    <label>Marca</label>
                    <input type="text" name="marca">
                </div>

            </div>

            <div class="full">
                <label>Selecione o arquivo XML</label>
                <div class="upload-box">
                    <input type="file" name="xml_file" required>
                </div>
            </div>

            <br>

            <button type="submit">Converter XML</button>

        </form>

    </div>

</body>
</html>
