<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor XML → Bling</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #7F00FF, #E100FF);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            width: 420px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            font-size: 26px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #7F00FF, #E100FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            text-align: center;
            color: #666;
            margin-top: 0;
            margin-bottom: 30px;
        }

        label {
            font-weight: 600;
            margin-top: 16px;
            display: block;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            margin-top: 6px;
            font-size: 15px;
            transition: 0.2s;
        }

        input:focus, select:focus {
            border-color: #7F00FF;
            box-shadow: 0 0 6px rgba(127, 0, 255, 0.4);
        }

        .upload-area {
            margin-top: 10px;
            border: 2px dashed #bbb;
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            color: #777;
            cursor: pointer;
            transition: 0.2s;
        }

        .upload-area:hover {
            background: #f9f2ff;
            border-color: #7F00FF;
            color: #7F00FF;
        }

        .btn {
            width: 100%;
            margin-top: 25px;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            background: linear-gradient(135deg, #7F00FF, #E100FF);
            box-shadow: 0 6px 18px rgba(127, 0, 255, 0.4);
            transition: 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 24px rgba(127, 0, 255, 0.55);
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Conversor XML → Bling</h1>
        <p class="subtitle">Transforme sua NF-e em planilha com um clique</p>

        <form action="http://localhost:8000/converter" method="POST" enctype="multipart/form-data">

            <label>Arquivo XML</label>
            <div class="upload-area" onclick="document.getElementById('xml').click()">
                Clique aqui ou arraste seu arquivo XML
            </div>
            <input id="xml" name="xml_file" type="file" accept=".xml" style="display:none">

            <label>Markup (%)</label>
            <input type="number" name="markup" required>

            <label>CEST</label>
            <input type="text" name="cest" required>

            <label>Modo de Conversão</label>
            <select name="modo">
                <option value="SIMPLES">Simples</option>
                <option value="VARIAÇÃO">Variação</option>
            </select>

            <label>Marca Padrão</label>
            <input type="text" name="marca">

            <button class="btn">Converter XML</button>

        </form>
    </div>
</body>
</html>
