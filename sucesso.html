<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Arquivo Pronto</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #e7f7ee;
            display: flex;
            justify-content: center;
            padding: 25px;
        }

        .box {
            background: #d6f3df;
            width: 90%;
            max-width: 700px;
            padding: 35px;
            border-radius: 14px;
            box-shadow: 0 0 15px rgba(0,0,0,0.15);
            text-align: center;
        }

        h1 {
            color: #2e6040;
            margin-bottom: 20px;
        }

        p {
            font-size: 17px;
            color: #234a34;
        }

        a.button {
            display: block;
            margin-top: 25px;
            padding: 15px;
            background: #3c8f5e;
            color: white;
            border-radius: 10px;
            text-decoration: none;
            font-size: 18px;
        }

        a.button:hover {
            background: #2f744c;
        }
    </style>
</head>

<body>
    <div class="box">

        <h1>Seu arquivo está pronto! 🎉</h1>

        <p>{nome_cliente}, sua conversão foi concluída com sucesso.</p>
        <p>Agora você pode baixar o arquivo Excel processado.</p>

        <a class="button" href="/download/{arquivo}">Baixar Excel</a>

        <br><br>
        <p>Obrigado por utilizar o Conversor Bling → Excel.</p>
    </div>
</body>
</html>
